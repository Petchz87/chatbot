services:
  db:
      image: pgvector/pgvector:pg16  # ใช้ Image ที่มี Vector Extension มาให้แล้ว
      environment:
        POSTGRES_USER: ${DB_USER:-postgres}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_DB: ${DB_NAME:-admin_chatbot}
      ports:
        - "5434:5432" # แมปพอร์ต 5434 ให้ Windows ใช้ (ถ้าคุณอยากใช้ DBeaver ต่อเข้าไปดู)
      volumes:
        - pgdata:/var/lib/postgresql/data
  chatbot:
    build: .
    ports:
      - "8000:8000"
    env_file: config.env
    environment:
      - HF_HOME=/app/.cache
    volumes:
      - .:/app
      - chatbot_model_cache:/app/.cache

volumes:
  chatbot_model_cache:
  pgdata: